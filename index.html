<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ksjp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        /* Susunan "grid" untuk gambar */
        .gallery {
            display: 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 20px auto;
            padding: 10px;
        }

        /* Hiasan untuk setiap kotak gambar */
        .gallery-item {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .gallery-item:hover {
            transform: scale(1.03); /* Gambar membesar sedikit apabila "hover" */
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: contain; /* Memastikan gambar tidak herot (distorted) */
            display: block;
        }

        .desc {
            padding: 15px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Hai Assalamualaikum</h1>
    <p>Selamat datang ke laman web paparan gambar saya. Hahaha</p>

    <div class="gallery">
        <!-- Gambar 1 -->
        <div class="gallery-item">
            <img src="tour1.png" alt="Gambar Rawak 1">
            <div class="desc">Gambar 1</div>
        </div>

        <!-- Gambar 2 -->
        <div class="gallery-item">
            <img src="tour2.png" alt="Gambar Rawak 2">
            <div class="desc"> Gambar 2</div>
        </div>

        <!-- Gambar 3 -->
        <div class="gallery-item">
            <img src="kiki.png" alt="Gambar Rawak 3">
            <div class="desc"> Gambar 3</div>
        </div>
    </div>

</body>
</html>
